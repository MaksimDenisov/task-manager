services:
  task-manager:
    build:
      context: .
      dockerfile: task-manager/Dockerfile
    depends_on:
      db:
        condition: service_healthy
  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
  mail-sender:
    build:
      context: .
      dockerfile: mail-sender/Dockerfile
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./web/static:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tm_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d tm_db" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
  kafka:
    image: apache/kafka:4.1.0
    volumes:
      - kafka_data:/var/lib/kafka/data
volumes:
    postgres_data:
    kafka_data: